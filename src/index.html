<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <title>Form Validation Assigment</title>
  </head>
  <body>
    <form novalidate>
      <h1>Sign up</h1>
      <div>
        <label for="email">Email</label>
        <input type="text" name="email" id="email" autocomplete="off" />
      </div>

      <div>
        <label for="country">Country</label>
        <select name="country" id="country" autocomplete="off">
          <option value="switzerland">Switzerland</option>
          <option value="france">France</option>
          <option value="germany">Germany</option>
          <option value="netherlands">The Netherlands</option>
        </select>
      </div>

      <div>
        <label for="postal">Postal Code</label>
        <input type="text" name="postal" id="postal" autocomplete="off" />
      </div>

      <div>
        <label for="password">Password</label>
        <input type="text" name="password" id="password" autocomplete="off" />
      </div>

      <div>
        <label for="confirm">Confirm password</label>
        <input type="text" name="confirm" id="confirm" autocomplete="off" />
      </div>
      <div>
        <button>Submit</button>
      </div>
    </form>
  </body>
</html>
